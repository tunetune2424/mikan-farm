<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="100%" stop-color="#FFE0C0"/>
    </linearGradient>
    <linearGradient id="fruitGrad" x1="0.15" y1="0.1" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#FF9848"/>
      <stop offset="50%" stop-color="#E8622A"/>
      <stop offset="100%" stop-color="#C04018"/>
    </linearGradient>
    <linearGradient id="fruitGrad2" x1="0.15" y1="0.1" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#FFB060"/>
      <stop offset="50%" stop-color="#F07030"/>
      <stop offset="100%" stop-color="#C85020"/>
    </linearGradient>
    <linearGradient id="fruitGrad3" x1="0.15" y1="0.1" x2="0.85" y2="0.9">
      <stop offset="0%" stop-color="#FF8838"/>
      <stop offset="60%" stop-color="#E05820"/>
      <stop offset="100%" stop-color="#B83810"/>
    </linearGradient>
    <linearGradient id="fleshGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD880"/>
      <stop offset="50%" stop-color="#FFB840"/>
      <stop offset="100%" stop-color="#E89020"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B9B78"/>
      <stop offset="100%" stop-color="#3D6B4F"/>
    </linearGradient>
    <radialGradient id="gloss" cx="28%" cy="22%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(255,130,60,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,130,60,0)"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(180,70,20,0.28)"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(180,70,20,0.22)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#bgGlow)"/>

  <!-- Warm light rays -->
  <line x1="400" y1="0" x2="300" y2="600" stroke="rgba(255,180,80,0.08)" stroke-width="80"/>
  <line x1="600" y1="0" x2="480" y2="600" stroke="rgba(255,180,80,0.06)" stroke-width="60"/>

  <!-- Background branch upper left -->
  <path d="M0 160 C80 145 170 140 260 150 C330 157 380 165 420 160" stroke="#5A7A48" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Background branch upper right -->
  <path d="M800 140 C720 152 630 148 550 158 C490 165 450 170 420 165" stroke="#5A7A48" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Background leaves -->
  <ellipse cx="70" cy="152" rx="50" ry="22" fill="#4A7A58" opacity="0.4" transform="rotate(-22,70,152)"/>
  <ellipse cx="175" cy="140" rx="45" ry="20" fill="#527D60" opacity="0.38" transform="rotate(12,175,140)"/>
  <ellipse cx="280" cy="145" rx="48" ry="21" fill="#4A7A58" opacity="0.38" transform="rotate(-18,280,145)"/>
  <ellipse cx="690" cy="138" rx="44" ry="19" fill="#527D60" opacity="0.36" transform="rotate(18,690,138)"/>
  <ellipse cx="770" cy="130" rx="42" ry="18" fill="#4A7A58" opacity="0.35" transform="rotate(-12,770,130)"/>

  <!-- Small background fruits -->
  <circle cx="130" cy="130" r="24" fill="#E8622A" opacity="0.35"/>
  <circle cx="720" cy="120" r="22" fill="#F07030" opacity="0.3"/>

  <!-- Floor shadow -->
  <ellipse cx="400" cy="552" rx="230" ry="24" fill="rgba(180,70,20,0.18)"/>

  <!-- Main branch -->
  <path d="M30 420 C130 400 230 392 340 398 C430 402 500 405 580 400 C660 394 730 390 800 385" stroke="#4A6B35" stroke-width="22" fill="none" stroke-linecap="round" filter="url(#shadowSm)"/>

  <!-- Branch leaves -->
  <ellipse cx="120" cy="392" rx="56" ry="24" fill="url(#leafGrad)" transform="rotate(-28,120,392)"/>
  <ellipse cx="118" cy="391" rx="54" ry="22" fill="#4A7A58" transform="rotate(-28,118,391)" opacity="0.8"/>
  <line x1="104" y1="380" x2="132" y2="398" stroke="#3D6B4F" stroke-width="1.5" opacity="0.5"/>

  <ellipse cx="260" cy="384" rx="58" ry="25" fill="url(#leafGrad)" transform="rotate(18,260,384)"/>
  <ellipse cx="257" cy="383" rx="56" ry="23" fill="#527D60" transform="rotate(18,257,383)" opacity="0.8"/>

  <ellipse cx="460" cy="382" rx="54" ry="23" fill="url(#leafGrad)" transform="rotate(-22,460,382)"/>
  <ellipse cx="457" cy="381" rx="52" ry="21" fill="#4A7A58" transform="rotate(-22,457,381)" opacity="0.8"/>

  <ellipse cx="660" cy="376" rx="52" ry="22" fill="url(#leafGrad)" transform="rotate(12,660,376)"/>
  <ellipse cx="657" cy="375" rx="50" ry="20" fill="#527D60" transform="rotate(12,657,375)" opacity="0.8"/>

  <!-- Fruits hanging from branch -->
  <!-- Fruit 1 (left, slightly smaller) -->
  <circle cx="170" cy="475" r="54" fill="#C04018" opacity="0.75" filter="url(#shadowSm)"/>
  <circle cx="168" cy="472" r="52" fill="url(#fruitGrad3)"/>
  <circle cx="168" cy="472" r="52" fill="url(#gloss)"/>
  <rect x="165" y="418" width="5" height="17" rx="2.5" fill="#3D6B4F"/>
  <ellipse cx="168" cy="417" rx="13" ry="6" fill="#4A7A58" transform="rotate(-10,168,417)"/>

  <!-- Fruit 2 (main center, largest) -->
  <circle cx="355" cy="472" r="66" fill="#C04018" opacity="0.85" filter="url(#shadow)"/>
  <circle cx="353" cy="469" r="64" fill="url(#fruitGrad)"/>
  <circle cx="353" cy="469" r="64" fill="url(#gloss)"/>
  <rect x="350" y="404" width="6" height="20" rx="3" fill="#3D6B4F"/>
  <ellipse cx="353" cy="403" rx="16" ry="7" fill="#4A7A58" transform="rotate(-8,353,403)"/>
  <ellipse cx="344" cy="403" rx="13" ry="6" fill="#527D60" transform="rotate(15,344,403)"/>

  <!-- Fruit 3 (center-right, half-cross-section) -->
  <circle cx="520" cy="465" r="60" fill="#C85020" filter="url(#shadow)"/>
  <!-- Flesh revealed left side -->
  <path d="M520 405 A60 60 0 0 0 520 525 Z" fill="url(#fleshGrad)"/>
  <!-- Segment dividers -->
  <path d="M520 405 L470 428" stroke="#E07030" stroke-width="1.5" opacity="0.5"/>
  <path d="M520 405 L465 465" stroke="#E07030" stroke-width="1.5" opacity="0.5"/>
  <path d="M520 525 L468 502" stroke="#E07030" stroke-width="1.5" opacity="0.5"/>
  <path d="M520 465 L460 465" stroke="#E07030" stroke-width="2" opacity="0.4"/>
  <!-- Flesh center -->
  <circle cx="495" cy="465" r="10" fill="#FFD060" opacity="0.75"/>
  <!-- Outer skin on whole side -->
  <path d="M520 405 A60 60 0 1 1 520 525 Z" fill="url(#fruitGrad2)"/>
  <path d="M520 405 A60 60 0 1 1 520 525 Z" fill="url(#gloss)"/>
  <!-- Stem -->
  <rect x="517" y="404" width="5" height="18" rx="2.5" fill="#3D6B4F"/>
  <ellipse cx="520" cy="403" rx="14" ry="6" fill="#4A7A58" transform="rotate(-7,520,403)"/>

  <!-- Fruit 4 (right) -->
  <circle cx="680" cy="470" r="56" fill="#C04018" opacity="0.8" filter="url(#shadowSm)"/>
  <circle cx="678" cy="467" r="54" fill="url(#fruitGrad3)"/>
  <circle cx="678" cy="467" r="54" fill="url(#gloss)"/>
  <rect x="675" y="412" width="5" height="17" rx="2.5" fill="#3D6B4F"/>
  <ellipse cx="678" cy="411" rx="13" ry="6" fill="#4A7A58" transform="rotate(-12,678,411)"/>

  <!-- Skin texture dimples (subtle) -->
  <circle cx="330" cy="448" r="2.5" fill="rgba(180,40,10,0.2)"/>
  <circle cx="368" cy="458" r="2" fill="rgba(180,40,10,0.18)"/>
  <circle cx="345" cy="475" r="2.5" fill="rgba(180,40,10,0.2)"/>
  <circle cx="372" cy="485" r="2" fill="rgba(180,40,10,0.15)"/>

  <!-- Floating peel spirals (decorative) -->
  <path d="M220 350 C225 340 235 338 238 345 C241 352 235 360 228 358 C222 356 220 350 225 346" stroke="#E8834A" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M600 335 C605 325 615 323 618 330 C621 337 615 345 608 343 C602 341 600 335 605 331" stroke="#E8834A" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Rarity badge (数量限定 feel) -->
  <text x="400" y="592" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(180,80,20,0.28)" text-anchor="middle" letter-spacing="4">IZUMIKAN — RARE LOCAL VARIETY</text>
</svg>
