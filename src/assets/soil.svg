<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C2"/>
      <stop offset="100%" stop-color="#A8D4A0"/>
    </linearGradient>
    <linearGradient id="soilTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4E2A"/>
      <stop offset="100%" stop-color="#5A3D1E"/>
    </linearGradient>
    <linearGradient id="soilMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3D1E"/>
      <stop offset="100%" stop-color="#4A3018"/>
    </linearGradient>
    <linearGradient id="soilDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D2510"/>
      <stop offset="100%" stop-color="#2A1A08"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A8C65"/>
      <stop offset="100%" stop-color="#3D6B4F"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Sky / background -->
  <rect width="1000" height="800" fill="url(#skyGrad)"/>

  <!-- Subtle texture overlay -->
  <rect width="1000" height="800" fill="rgba(255,255,255,0.05)"/>

  <!-- Ground surface line -->
  <ellipse cx="500" cy="430" rx="420" ry="18" fill="#4A3018" opacity="0.4"/>

  <!-- Soil cross-section layers -->
  <!-- Top soil layer -->
  <rect x="120" y="430" width="760" height="110" rx="4" fill="url(#soilTop)"/>
  <!-- Mid layer -->
  <rect x="120" y="535" width="760" height="110" rx="4" fill="url(#soilMid)"/>
  <!-- Deep layer -->
  <rect x="120" y="640" width="760" height="120" rx="4" fill="url(#soilDeep)"/>

  <!-- Layer labels (Japanese farm aesthetic) -->
  <text x="155" y="497" font-family="Georgia, serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="3">表土層</text>
  <text x="155" y="602" font-family="Georgia, serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">有機層</text>
  <text x="155" y="700" font-family="Georgia, serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="3">基盤層</text>

  <!-- Organic matter particles in top soil -->
  <ellipse cx="300" cy="465" rx="18" ry="6" fill="#8B6A3A" opacity="0.6" transform="rotate(-15,300,465)"/>
  <ellipse cx="450" cy="480" rx="14" ry="5" fill="#7A5A2E" opacity="0.5" transform="rotate(10,450,480)"/>
  <ellipse cx="620" cy="458" rx="20" ry="7" fill="#8B6A3A" opacity="0.6" transform="rotate(-5,620,458)"/>
  <ellipse cx="750" cy="475" rx="12" ry="4" fill="#9A7040" opacity="0.5" transform="rotate(20,750,475)"/>

  <!-- Roots -->
  <!-- Main trunk root going down -->
  <path d="M500 430 C498 470 496 520 494 570 C492 620 490 660 488 690" stroke="#8B6040" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Root branches -->
  <path d="M498 470 C480 475 450 465 420 480 C390 495 360 490 340 500" stroke="#7A5030" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M496 510 C510 510 540 500 570 510 C600 520 630 515 650 520" stroke="#7A5030" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M495 550 C475 548 445 555 415 545 C385 535 360 545 340 540" stroke="#6B4525" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M493 580 C510 575 545 585 575 575 C605 565 635 575 660 570" stroke="#6B4525" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M492 610 C472 615 442 608 410 618 C380 628 355 620 330 625" stroke="#5A3A1E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M491 640 C512 635 548 645 580 638 C612 631 642 640 668 635" stroke="#5A3A1E" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Microorganism dots in soil (organic life) -->
  <circle cx="280" cy="490" r="3" fill="#A08050" opacity="0.7"/>
  <circle cx="350" cy="475" r="2" fill="#A08050" opacity="0.6"/>
  <circle cx="400" cy="495" r="2.5" fill="#A08050" opacity="0.65"/>
  <circle cx="550" cy="468" r="3" fill="#A08050" opacity="0.7"/>
  <circle cx="660" cy="485" r="2" fill="#A08050" opacity="0.6"/>
  <circle cx="720" cy="492" r="3" fill="#A08050" opacity="0.7"/>
  <circle cx="820" cy="470" r="2" fill="#A08050" opacity="0.6"/>

  <!-- Above ground: tree trunk -->
  <rect x="478" y="220" width="44" height="215" rx="8" fill="#5C3A1A"/>
  <!-- Trunk texture lines -->
  <path d="M485 235 C490 260 488 300 485 340" stroke="#4A2E14" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M510 240 C513 270 511 310 509 350" stroke="#4A2E14" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Tree canopy -->
  <ellipse cx="500" cy="170" rx="180" ry="130" fill="url(#leafGrad)" filter="url(#softShadow)"/>
  <ellipse cx="380" cy="200" rx="100" ry="80" fill="#4A7A58" opacity="0.85"/>
  <ellipse cx="620" cy="195" rx="110" ry="85" fill="#4A7A58" opacity="0.85"/>
  <ellipse cx="500" cy="100" rx="130" ry="90" fill="#527D60" opacity="0.9"/>

  <!-- Leaf highlights -->
  <ellipse cx="440" cy="140" rx="60" ry="40" fill="#6B9B78" opacity="0.4"/>
  <ellipse cx="560" cy="150" rx="55" ry="35" fill="#6B9B78" opacity="0.35"/>

  <!-- Small citrus fruits on tree -->
  <circle cx="430" cy="185" r="16" fill="#E8834A"/>
  <circle cx="430" cy="185" r="14" fill="#F2A877"/>
  <circle cx="570" cy="175" r="15" fill="#E8834A"/>
  <circle cx="570" cy="175" r="13" fill="#F2A877"/>
  <circle cx="500" cy="130" r="14" fill="#E8834A"/>
  <circle cx="500" cy="130" r="12" fill="#F2A877"/>
  <circle cx="470" cy="220" r="13" fill="#D97830"/>
  <circle cx="540" cy="210" r="14" fill="#D97830"/>

  <!-- Ground surface details (grass/leaves) -->
  <!-- Fallen leaves -->
  <ellipse cx="200" cy="428" rx="28" ry="10" fill="#8BA870" transform="rotate(-20,200,428)" opacity="0.8"/>
  <ellipse cx="320" cy="425" rx="22" ry="8" fill="#7A9B62" transform="rotate(15,320,425)" opacity="0.7"/>
  <ellipse cx="670" cy="427" rx="25" ry="9" fill="#8BA870" transform="rotate(-10,670,427)" opacity="0.8"/>
  <ellipse cx="790" cy="424" rx="20" ry="8" fill="#7A9B62" transform="rotate(25,790,424)" opacity="0.7"/>

  <!-- Grass tufts -->
  <path d="M240 430 C238 415 235 405 240 395" stroke="#6B9040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M248 430 C250 412 255 402 248 392" stroke="#7A9F50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M256 430 C257 418 260 408 255 398" stroke="#6B9040" stroke-width="2" fill="none" stroke-linecap="round"/>

  <path d="M700 430 C698 415 695 405 700 395" stroke="#6B9040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M708 430 C710 412 715 402 708 392" stroke="#7A9F50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M716 430 C717 418 720 408 715 398" stroke="#6B9040" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Section label watermark -->
  <text x="500" y="780" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(58,45,30,0.25)" text-anchor="middle" letter-spacing="4">SOIL — YANBARU ORGANIC FARMING</text>
</svg>
