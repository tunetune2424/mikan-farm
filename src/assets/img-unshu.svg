<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFF8EC"/>
      <stop offset="100%" stop-color="#FFECD0"/>
    </linearGradient>
    <linearGradient id="fruitMain" x1="0.15" y1="0.08" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#FFCC60"/>
      <stop offset="40%" stop-color="#F5A030"/>
      <stop offset="100%" stop-color="#D07010"/>
    </linearGradient>
    <linearGradient id="fruitAlt" x1="0.2" y1="0.1" x2="0.85" y2="0.9">
      <stop offset="0%" stop-color="#FFD870"/>
      <stop offset="50%" stop-color="#F0B040"/>
      <stop offset="100%" stop-color="#C88018"/>
    </linearGradient>
    <linearGradient id="fruitSmall" x1="0.2" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%" stop-color="#FFC848"/>
      <stop offset="60%" stop-color="#E89828"/>
      <stop offset="100%" stop-color="#C07018"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B9B78"/>
      <stop offset="100%" stop-color="#3D6B4F"/>
    </linearGradient>
    <linearGradient id="basketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A870"/>
      <stop offset="100%" stop-color="#A88040"/>
    </linearGradient>
    <radialGradient id="gloss" cx="28%" cy="22%" r="52%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="rgba(255,180,60,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,180,60,0)"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="rgba(180,100,10,0.25)"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="rgba(180,100,10,0.2)"/>
    </filter>
    <filter id="basketShadow">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="rgba(100,60,10,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#bgGlow)"/>

  <!-- Soft warm light column -->
  <line x1="350" y1="0" x2="450" y2="600" stroke="rgba(255,200,80,0.09)" stroke-width="120"/>

  <!-- Background branch upper left -->
  <path d="M0 170 C90 155 190 150 290 160 C360 167 410 174 450 170" stroke="#5A7A48" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.38"/>
  <!-- Background branch upper right -->
  <path d="M800 145 C710 158 610 154 530 163 C470 170 435 175 400 170" stroke="#5A7A48" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Background leaves -->
  <ellipse cx="65" cy="162" rx="52" ry="22" fill="#4A7A58" opacity="0.38" transform="rotate(-24,65,162)"/>
  <ellipse cx="175" cy="150" rx="47" ry="20" fill="#527D60" opacity="0.36" transform="rotate(12,175,150)"/>
  <ellipse cx="295" cy="154" rx="50" ry="21" fill="#4A7A58" opacity="0.38" transform="rotate(-18,295,154)"/>
  <ellipse cx="690" cy="142" rx="46" ry="20" fill="#527D60" opacity="0.36" transform="rotate(16,690,142)"/>
  <ellipse cx="775" cy="132" rx="43" ry="18" fill="#4A7A58" opacity="0.35" transform="rotate(-14,775,132)"/>

  <!-- Small background fruits (peering from behind) -->
  <circle cx="135" cy="138" r="26" fill="#E89828" opacity="0.38"/>
  <circle cx="730" cy="125" r="23" fill="#F0A830" opacity="0.32"/>
  <circle cx="380" cy="148" r="20" fill="#E89828" opacity="0.3"/>

  <!-- Wicker basket (gift set feel) -->
  <!-- Basket body -->
  <ellipse cx="400" cy="480" rx="220" ry="30" fill="#8C6030" opacity="0.35"/>
  <!-- Basket front face -->
  <path d="M180 390 C180 370 180 360 200 350 L600 350 C620 360 620 370 620 390 L620 480 C620 500 610 510 590 515 L210 515 C190 510 180 500 180 480 Z" fill="url(#basketGrad)" filter="url(#basketShadow)"/>
  <!-- Basket weave pattern (horizontal) -->
  <path d="M180 370 C220 368 260 372 300 370 C340 368 380 372 420 370 C460 368 500 372 540 370 C580 368 610 370 620 370" stroke="#9A7040" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M180 390 C220 388 260 392 300 390 C340 388 380 392 420 390 C460 388 500 392 540 390 C580 388 615 390 620 390" stroke="#9A7040" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M180 410 C220 408 260 412 300 410 C340 408 380 412 420 410 C460 408 500 412 540 410 C580 408 618 410 620 410" stroke="#8C6535" stroke-width="2" fill="none" opacity="0.55"/>
  <path d="M180 430 C220 428 260 432 300 430 C340 428 380 432 420 430 C460 428 500 432 540 430 C580 428 618 430 620 430" stroke="#8C6535" stroke-width="2" fill="none" opacity="0.55"/>
  <path d="M182 450 C220 448 260 452 300 450 C340 448 380 452 420 450 C460 448 500 452 540 450 C580 448 618 450 619 450" stroke="#9A7040" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M185 470 C220 468 260 472 300 470 C340 468 380 472 420 470 C460 468 500 472 540 470 C580 468 614 470 615 470" stroke="#9A7040" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M190 490 C225 488 265 492 305 490 C345 488 385 492 420 490 C455 488 495 492 535 490 C565 488 598 490 610 492" stroke="#8C6535" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M200 507 C238 505 278 509 318 507 C358 505 395 509 420 507 C450 505 488 509 528 507 C558 505 588 507 600 509" stroke="#8C6535" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Basket weave (vertical slats) -->
  <line x1="225" y1="350" x2="212" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <line x1="285" y1="350" x2="275" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <line x1="345" y1="350" x2="338" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <line x1="400" y1="350" x2="400" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <line x1="455" y1="350" x2="462" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <line x1="515" y1="350" x2="525" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <line x1="575" y1="350" x2="588" y2="515" stroke="#A07840" stroke-width="2" opacity="0.35"/>
  <!-- Basket top rim -->
  <ellipse cx="400" cy="350" rx="220" ry="22" fill="#B08848"/>
  <ellipse cx="400" cy="350" rx="218" ry="20" fill="#C09858"/>
  <ellipse cx="400" cy="348" rx="210" ry="15" fill="#D0A868" opacity="0.7"/>

  <!-- Handle left arc -->
  <path d="M230 350 C200 280 210 220 280 210 C320 205 350 225 370 260" stroke="#9A7040" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M230 350 C200 280 210 220 280 210 C320 205 350 225 370 260" stroke="#B08848" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Handle right arc -->
  <path d="M570 350 C600 280 590 220 520 210 C480 205 450 225 430 260" stroke="#9A7040" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M570 350 C600 280 590 220 520 210 C480 205 450 225 430 260" stroke="#B08848" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Fruits inside basket (above rim) -->
  <!-- Back row (smaller/behind) -->
  <circle cx="290" cy="320" r="42" fill="#C87818" opacity="0.7" filter="url(#shadowSm)"/>
  <circle cx="288" cy="317" r="40" fill="url(#fruitSmall)"/>
  <circle cx="288" cy="317" r="40" fill="url(#gloss)" opacity="0.7"/>
  <rect x="286" y="276" width="4" height="14" rx="2" fill="#3D6B4F" opacity="0.8"/>
  <ellipse cx="288" cy="275" rx="12" ry="5" fill="#4A7A58" opacity="0.8"/>

  <circle cx="400" cy="305" r="48" fill="#C87818" opacity="0.75" filter="url(#shadowSm)"/>
  <circle cx="398" cy="302" r="46" fill="url(#fruitAlt)"/>
  <circle cx="398" cy="302" r="46" fill="url(#gloss)" opacity="0.75"/>
  <rect x="396" y="255" width="5" height="16" rx="2.5" fill="#3D6B4F" opacity="0.8"/>
  <ellipse cx="399" cy="254" rx="13" ry="6" fill="#4A7A58" opacity="0.8" transform="rotate(-8,399,254)"/>

  <circle cx="510" cy="318" r="43" fill="#C87818" opacity="0.7" filter="url(#shadowSm)"/>
  <circle cx="508" cy="315" r="41" fill="url(#fruitSmall)"/>
  <circle cx="508" cy="315" r="41" fill="url(#gloss)" opacity="0.7"/>
  <rect x="506" y="273" width="4" height="14" rx="2" fill="#3D6B4F" opacity="0.8"/>
  <ellipse cx="508" cy="272" rx="11" ry="5" fill="#4A7A58" opacity="0.8"/>

  <!-- Front row (larger, over rim) -->
  <circle cx="335" cy="360" r="52" fill="#C87818" opacity="0.85" filter="url(#shadow)"/>
  <circle cx="333" cy="357" r="50" fill="url(#fruitMain)"/>
  <circle cx="333" cy="357" r="50" fill="url(#gloss)"/>
  <rect x="330" y="306" width="5" height="18" rx="2.5" fill="#3D6B4F"/>
  <ellipse cx="333" cy="305" rx="14" ry="6" fill="#4A7A58" transform="rotate(-10,333,305)"/>
  <ellipse cx="325" cy="305" rx="12" ry="5" fill="#527D60" transform="rotate(12,325,305)"/>

  <circle cx="465" cy="355" r="54" fill="#C87818" opacity="0.88" filter="url(#shadow)"/>
  <circle cx="463" cy="352" r="52" fill="url(#fruitAlt)"/>
  <circle cx="463" cy="352" r="52" fill="url(#gloss)"/>
  <rect x="460" y="299" width="5" height="18" rx="2.5" fill="#3D6B4F"/>
  <ellipse cx="463" cy="298" rx="14" ry="6" fill="#4A7A58" transform="rotate(-6,463,298)"/>
  <ellipse cx="455" cy="298" rx="12" ry="5" fill="#527D60" transform="rotate(14,455,298)"/>

  <!-- Leaves peeking from basket -->
  <ellipse cx="260" cy="342" rx="40" ry="17" fill="#4A7A58" transform="rotate(-18,260,342)" opacity="0.75"/>
  <ellipse cx="540" cy="340" rx="38" ry="16" fill="#527D60" transform="rotate(15,540,340)" opacity="0.7"/>
  <ellipse cx="400" cy="335" rx="36" ry="15" fill="#4A7A58" transform="rotate(-8,400,335)" opacity="0.65"/>

  <!-- Texture dimples on fruits -->
  <circle cx="312" cy="342" r="2.5" fill="rgba(160,80,10,0.2)"/>
  <circle cx="348" cy="362" r="2" fill="rgba(160,80,10,0.18)"/>
  <circle cx="330" cy="375" r="2.5" fill="rgba(160,80,10,0.18)"/>
  <circle cx="445" cy="338" r="2.5" fill="rgba(160,80,10,0.2)"/>
  <circle cx="478" cy="356" r="2" fill="rgba(160,80,10,0.15)"/>

  <!-- Floating leaves outside basket -->
  <ellipse cx="140" cy="300" rx="32" ry="14" fill="#6B9B78" opacity="0.45" transform="rotate(-20,140,300)"/>
  <ellipse cx="660" cy="290" rx="30" ry="13" fill="#527D60" opacity="0.4" transform="rotate(22,660,290)"/>

  <!-- Label area at bottom -->
  <text x="400" y="590" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(160,100,10,0.28)" text-anchor="middle" letter-spacing="4">UNSHU MIKAN — GIFT BOX</text>
</svg>
