<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF0E4"/>
      <stop offset="100%" stop-color="#F5E4CC"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5B87A"/>
      <stop offset="50%" stop-color="#E8834A"/>
      <stop offset="100%" stop-color="#C96A35"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2A877"/>
      <stop offset="60%" stop-color="#E07840"/>
      <stop offset="100%" stop-color="#C06030"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D5B0"/>
      <stop offset="100%" stop-color="#E8C090"/>
    </linearGradient>
    <linearGradient id="branchGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D6B4F"/>
      <stop offset="100%" stop-color="#2A4A37"/>
    </linearGradient>
    <filter id="fruitShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="rgba(180,80,20,0.3)"/>
    </filter>
    <filter id="handShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="8" stdDeviation="12" flood-color="rgba(58,45,30,0.2)"/>
    </filter>
    <radialGradient id="gloss" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow in center -->
  <radialGradient id="centerGlow" cx="50%" cy="45%" r="50%">
    <stop offset="0%" stop-color="rgba(232,131,74,0.12)"/>
    <stop offset="100%" stop-color="rgba(232,131,74,0)"/>
  </radialGradient>
  <rect width="1000" height="800" fill="url(#centerGlow)"/>

  <!-- Background branches (decorative) -->
  <!-- Far branch left -->
  <path d="M0 280 C80 260 160 240 240 250 C300 258 340 265 380 260" stroke="#5A8C65" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M100 260 C120 230 140 210 160 195" stroke="#5A8C65" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Background leaves -->
  <ellipse cx="80" cy="275" rx="35" ry="18" fill="#6B9B78" opacity="0.35" transform="rotate(-20,80,275)"/>
  <ellipse cx="160" cy="250" rx="38" ry="16" fill="#527D60" opacity="0.3" transform="rotate(10,160,250)"/>
  <ellipse cx="155" cy="198" rx="30" ry="14" fill="#6B9B78" opacity="0.3" transform="rotate(-30,155,198)"/>

  <!-- Far branch right -->
  <path d="M1000 200 C920 210 840 200 760 210 C700 218 660 225 620 220" stroke="#5A8C65" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M880 205 C870 175 855 155 840 140" stroke="#5A8C65" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <ellipse cx="930" cy="207" rx="35" ry="16" fill="#6B9B78" opacity="0.35" transform="rotate(15,930,207)"/>
  <ellipse cx="845" cy="142" rx="28" ry="14" fill="#527D60" opacity="0.3" transform="rotate(-25,845,142)"/>

  <!-- Main central branch -->
  <path d="M100 400 C200 380 320 370 440 380 C520 386 580 390 660 385 C760 378 860 375 950 380" stroke="url(#branchGrad)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Branch texture / highlight -->
  <path d="M100 395 C200 376 320 367 440 376 C520 382 580 386 660 381 C760 374 860 371 950 376" stroke="rgba(255,255,255,0.12)" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Branch leaves -->
  <!-- Left side leaves -->
  <ellipse cx="160" cy="375" rx="48" ry="22" fill="#4A7A58" transform="rotate(-30,160,375)"/>
  <ellipse cx="155" cy="374" rx="46" ry="20" fill="#527D60" transform="rotate(-30,155,374)"/>
  <path d="M175 364 L152 375" stroke="#3D6B4F" stroke-width="1.5" fill="none"/>

  <ellipse cx="220" cy="358" rx="44" ry="20" fill="#4A7A58" transform="rotate(15,220,358)"/>
  <ellipse cx="217" cy="357" rx="42" ry="18" fill="#5A8C68" transform="rotate(15,217,357)"/>

  <ellipse cx="310" cy="362" rx="50" ry="21" fill="#3D6B4F" transform="rotate(-20,310,362)"/>
  <ellipse cx="307" cy="361" rx="48" ry="19" fill="#4A7A58" transform="rotate(-20,307,361)"/>

  <!-- Right side leaves -->
  <ellipse cx="720" cy="368" rx="48" ry="21" fill="#4A7A58" transform="rotate(25,720,368)"/>
  <ellipse cx="717" cy="367" rx="46" ry="19" fill="#527D60" transform="rotate(25,717,367)"/>

  <ellipse cx="810" cy="362" rx="44" ry="20" fill="#3D6B4F" transform="rotate(-15,810,362)"/>
  <ellipse cx="807" cy="361" rx="42" ry="18" fill="#4A7A58" transform="rotate(-15,807,361)"/>

  <ellipse cx="890" cy="370" rx="46" ry="20" fill="#4A7A58" transform="rotate(10,890,370)"/>

  <!-- Leaf veins -->
  <path d="M148 368 L165 380" stroke="#3D6B4F" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M210 352 L224 364" stroke="#3D6B4F" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Fruits hanging from branch -->
  <!-- Fruit 1 (far left, smaller/background) -->
  <circle cx="185" cy="435" r="36" fill="#C96A35" opacity="0.6"/>
  <circle cx="183" cy="432" r="34" fill="#D97840" opacity="0.7"/>
  <!-- stem -->
  <rect x="182" y="395" width="4" height="15" rx="2" fill="#3D6B4F" opacity="0.6"/>
  <ellipse cx="184" cy="394" rx="10" ry="5" fill="#4A7A58" opacity="0.6" transform="rotate(-10,184,394)"/>

  <!-- Fruit 2 -->
  <circle cx="340" cy="440" r="48" fill="#C96A35" opacity="0.8"/>
  <circle cx="338" cy="437" r="46" fill="#D97840" opacity="0.9"/>
  <circle cx="338" cy="437" r="46" fill="url(#gloss)"/>
  <!-- stem -->
  <rect x="336" y="392" width="5" height="18" rx="2" fill="#3D6B4F"/>
  <ellipse cx="339" cy="391" rx="14" ry="6" fill="#4A7A58" transform="rotate(-5,339,391)"/>

  <!-- Fruit 3 - main fruit being picked (large, central) -->
  <circle cx="500" cy="450" r="72" fill="url(#orangeGrad)" filter="url(#fruitShadow)"/>
  <circle cx="500" cy="450" r="72" fill="url(#gloss)"/>
  <!-- Fruit texture segments subtle -->
  <path d="M500 378 C500 378 500 522 500 522" stroke="rgba(200,90,30,0.15)" stroke-width="1.5" fill="none"/>
  <path d="M430 410 C430 410 570 490 570 490" stroke="rgba(200,90,30,0.15)" stroke-width="1.5" fill="none"/>
  <path d="M430 490 C430 490 570 410 570 410" stroke="rgba(200,90,30,0.15)" stroke-width="1.5" fill="none"/>
  <!-- stem -->
  <rect x="496" y="376" width="7" height="20" rx="3" fill="#3D6B4F"/>
  <!-- small leaf at stem -->
  <ellipse cx="503" cy="374" rx="18" ry="8" fill="#4A7A58" transform="rotate(-15,503,374)"/>
  <ellipse cx="491" cy="374" rx="16" ry="7" fill="#527D60" transform="rotate(20,491,374)"/>

  <!-- Fruit 4 -->
  <circle cx="660" cy="438" r="50" fill="url(#orangeGrad2)" filter="url(#fruitShadow)" opacity="0.95"/>
  <circle cx="660" cy="438" r="50" fill="url(#gloss)"/>
  <rect x="657" y="388" width="6" height="18" rx="3" fill="#3D6B4F"/>
  <ellipse cx="663" cy="387" rx="15" ry="6" fill="#4A7A58" transform="rotate(-8,663,387)"/>

  <!-- Fruit 5 (far right, background) -->
  <circle cx="820" cy="432" r="38" fill="#C96A35" opacity="0.7"/>
  <circle cx="818" cy="429" r="36" fill="#D97840" opacity="0.8"/>
  <rect x="817" y="394" width="4" height="14" rx="2" fill="#3D6B4F" opacity="0.7"/>

  <!-- HANDS (picking the main fruit) -->
  <!-- Right hand reaching up from below -->
  <g filter="url(#handShadow)">
    <!-- Palm -->
    <ellipse cx="470" cy="540" rx="62" ry="48" fill="url(#skinGrad)" transform="rotate(-20,470,540)"/>

    <!-- Thumb -->
    <ellipse cx="525" cy="510" rx="16" ry="38" fill="#F0C898" transform="rotate(35,525,510)"/>
    <ellipse cx="538" cy="490" rx="13" ry="22" fill="#ECC090" transform="rotate(35,538,490)"/>

    <!-- Index finger -->
    <ellipse cx="490" cy="485" rx="13" ry="44" fill="#F0C898" transform="rotate(-10,490,485)"/>
    <ellipse cx="488" cy="453" rx="11" ry="24" fill="#ECC090" transform="rotate(-10,488,453)"/>

    <!-- Middle finger -->
    <ellipse cx="458" cy="478" rx="13" ry="46" fill="#F0C898" transform="rotate(-18,458,478)"/>
    <ellipse cx="453" cy="444" rx="11" ry="25" fill="#ECC090" transform="rotate(-18,453,444)"/>

    <!-- Ring finger -->
    <ellipse cx="428" cy="490" rx="12" ry="42" fill="#F0C898" transform="rotate(-28,428,490)"/>
    <ellipse cx="420" cy="458" rx="10" ry="22" fill="#ECC090" transform="rotate(-28,420,458)"/>

    <!-- Little finger -->
    <ellipse cx="402" cy="507" rx="11" ry="34" fill="#F0C898" transform="rotate(-38,402,507)"/>
    <ellipse cx="393" cy="480" rx="9" ry="18" fill="#ECC090" transform="rotate(-38,393,480)"/>

    <!-- Wrist / arm extending down -->
    <path d="M408 565 C400 590 395 620 390 650" stroke="#E8C090" stroke-width="44" fill="none" stroke-linecap="round"/>
    <path d="M530 555 C535 580 540 610 545 640" stroke="#E8C090" stroke-width="40" fill="none" stroke-linecap="round"/>
    <!-- Wrist shading -->
    <path d="M408 565 C400 590 395 620 390 650" stroke="#D4A878" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Knuckle details on fingers -->
  <circle cx="490" cy="470" r="2" fill="rgba(180,130,80,0.3)"/>
  <circle cx="456" cy="462" r="2" fill="rgba(180,130,80,0.3)"/>
  <circle cx="425" cy="476" r="2" fill="rgba(180,130,80,0.3)"/>

  <!-- Floating particles (pollen/scent) -->
  <circle cx="580" cy="350" r="4" fill="#F2A877" opacity="0.5"/>
  <circle cx="595" cy="325" r="3" fill="#E8834A" opacity="0.4"/>
  <circle cx="610" cy="345" r="5" fill="#F2A877" opacity="0.45"/>
  <circle cx="560" cy="310" r="3" fill="#E8834A" opacity="0.35"/>
  <circle cx="380" cy="340" r="4" fill="#F2A877" opacity="0.45"/>
  <circle cx="360" cy="318" r="3" fill="#E8834A" opacity="0.4"/>

  <!-- Light rays -->
  <line x1="500" y1="0" x2="500" y2="800" stroke="rgba(255,255,255,0.06)" stroke-width="60"/>
  <line x1="350" y1="0" x2="600" y2="800" stroke="rgba(255,255,255,0.04)" stroke-width="40"/>

  <!-- Season / label text -->
  <text x="500" y="760" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(58,45,30,0.2)" text-anchor="middle" letter-spacing="4">HARVEST — HANDPICKED WITH CARE</text>

  <!-- Year indicator -->
  <text x="880" y="760" font-family="Georgia, serif" font-size="22" fill="rgba(232,131,74,0.25)" font-style="italic">Jan–Feb</text>
</svg>
